<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triage Labels — Ambervale</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Source+Sans+3:wght@600&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }
@page { size:8.5in 11in; margin:0.4in; }
body { font-family:'Source Sans 3',sans-serif; background:#d9cba8; color:#2a2218; }
.screen-only {
  max-width:8.2in; margin:0.12in auto; background:#1d3a2a; color:#f0d9a0;
  border:1px solid #c8902f; border-radius:6px; padding:0.1in 0.18in; font-size:10pt;
}
.sheet { max-width:7.7in; margin:0 auto; padding:0.1in 0; }
h1 { font-family:'Cinzel',serif; font-size:11pt; color:#14271d; margin-bottom:0.08in; }
.sub { font-size:8.5pt; color:#4a3d28; font-style:italic; margin-bottom:0.15in; }
.row { display:flex; flex-direction:column; gap:0.14in; }
.label {
  display:flex; align-items:center; justify-content:space-between;
  width:100%; height:0.72in; padding:0 0.18in;
  border:2px solid #2c5440; border-radius:5px;
  font-family:'Cinzel',serif; font-weight:700; letter-spacing:0.06em;
  break-inside:avoid;
}
.label .name { font-size:18pt; text-transform:uppercase; }
.label .hint { font-family:'Source Sans 3',sans-serif; font-size:9pt; font-weight:600; letter-spacing:0.02em; opacity:0.85; }
.g { background:#d4e8d4; border-color:#6a9e6e; color:#1a3a22; }
.y { background:#f5e6c0; border-color:#c8902f; color:#5a3a08; }
.r { background:#f0c8bc; border-color:#c04a32; color:#5a1810; }
.k { background:#ddd4c4; border-color:#5a4a3a; color:#2a2218; }
.s { background:#c5d9e8; border-color:#3a6a8a; color:#1a3040; }
.set { margin-top:0.28in; padding-top:0.18in; border-top:1px dashed #8a7a60; }
@media print {
  .screen-only { display:none !important; }
  body { background:#fff; }
  .set { page-break-inside:avoid; }
}
</style>
</head>
<body>
<div class="screen-only"><b>Print &amp; cut.</b> Horizontal table headers only — slide patient cards under each. Two full sets per page.</div>
<div class="sheet">
  <h1>Triage headers</h1>
  <p class="sub">Place on the table. Patients go under the matching label.</p>

  <div class="row">
    <div class="label g"><span class="name">Green</span><span class="hint">can wait</span></div>
    <div class="label y"><span class="name">Gold</span><span class="hint">soon</span></div>
    <div class="label r"><span class="name">Scarlet</span><span class="hint">now</span></div>
    <div class="label k"><span class="name">Ink</span><span class="hint">beyond</span></div>
    <div class="label s"><span class="name">Saved</span><span class="hint">clear</span></div>
  </div>

  <div class="set row">
    <div class="label g"><span class="name">Green</span><span class="hint">can wait</span></div>
    <div class="label y"><span class="name">Gold</span><span class="hint">soon</span></div>
    <div class="label r"><span class="name">Scarlet</span><span class="hint">now</span></div>
    <div class="label k"><span class="name">Ink</span><span class="hint">beyond</span></div>
    <div class="label s"><span class="name">Saved</span><span class="hint">clear</span></div>
  </div>
</div>
</body>
</html>
